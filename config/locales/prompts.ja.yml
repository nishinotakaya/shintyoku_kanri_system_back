# AI プロンプト集（コードから外出し）。文言調整はこのファイルだけで完結する。
# 参照: ThumbnailPrompts / ThumbnailCopywriter / InterviewVideoScriptGenerator
# %{title} / %{summary} は実行時に差し込まれる（フロントの編集欄では生のまま表示される）。
ja:
  prompts:
    thumbnail:
      # 背景生成スタイル（フロントのスタイル選択／プロンプト編集欄の初期値）
      styles:
        anime_journey: |
          日本のYouTube教育・エンジニア転職系で流行している「アニメ調・3コマ ビフォー→転機→アフター」サムネイルの【イラスト背景】を生成してください。
          重要: 画像内に文字・テキスト・吹き出し・ロゴは一切描かない(あとで別途合成します)。

          # テーマ
          - タイトル: %{title}
          - 内容の要点: %{summary}
          - 上のタイトル/要点から「前職(過去の職業)」と「現在(エンジニア等)」を読み取り、その実際の職業・経歴に沿って描くこと。

          # 構図(16:9 / 1536x1024)
          - 横に3コマ並べる(細い区切り線)。同じ若い日本人男性(主人公)が左→中→右で人生が好転する。3コマとも一貫した同一人物の男性。
            - 左(ビフォー/前職): 【タイトル/要点に実際に書かれた前職・当時の状況】の現場で働く様子。例の職業をそのまま使わず、その動画の実際の経歴に合わせる(例はあくまで例: 接客なら店頭、工場なら製造現場、テスターなら地味な検証作業)。表情は疲れ・悩み。
              ※その前職がPCを使わない職種なら、左コマにノートPCは置かない(不自然な絵にしない)
            - 中(転機/学習): 自宅やカフェでノートPCに向かいプログラミングを学習。集中、少し苦戦
            - 右(アフター/現在): エンジニアとして活躍(きれいなデスク＋ノートPCや複数モニタ)。自信のある明るい笑顔
          - 明るく清潔感のあるアニメ/マンガ塗り(セルルック)、はっきりした輪郭線、高彩度
          - 画面下 約20%は、タイトル帯を乗せるため暗めの余白として空けておく(キャラを置かない)

          # トーン
          - 前向きで爽快。ひと目で「前職 → 学習 → エンジニア成功」の成長ストーリーが伝わる
        graphic_only: |
          日本のYouTube教育系で映える【グラフィック背景】を生成してください。人物は描かない。
          重要: 画像内に文字・テキスト・ロゴは一切描かない(あとで別途合成します)。

          # テーマ
          - タイトル: %{title}
          - 内容の要点: %{summary}

          # 画づくり(16:9 / 1536x1024)
          - プログラミング/ロードマップを連想させるモチーフ(矢印→、ステップ、コードの抽象、アイコン、ノートPCやデバイスのシルエット)
          - 左半分は文字を乗せる余白としてすっきり
          - 高彩度・高コントラスト(青×黄 / 赤×白)、斜めの集中線やグラデーションでスピード感
        real_person: |
          日本のYouTube教育・エンジニア転職系サムネイルの【背景画像】を生成してください。
          重要: 画像内に文字・テキスト・ロゴは一切描かない(あとで別途合成します)。

          # テーマ
          - タイトル: %{title}
          - 内容の要点: %{summary}

          # 画づくり(16:9 / 1536x1024)
          - 右側に、自信のある明るい表情の日本人エンジニア(20〜30代)のバストアップ。サムズアップ or 指差し。実写風で清潔感
          - 左側は文字を乗せる余白としてすっきり
          - 背景は高彩度・高コントラスト。斜めの集中線やグラデーションでスピード感
      # 文言(コピー)を新規生成するときの system プロンプト
      copywriter_system: |
        あなたは日本のトップYouTuberのサムネを量産するプロのコピーライターです。
        動画タイトルと内容要点から、思わずクリックしたくなる「リアルで生々しい」サムネ文言を作ります。
        毎回ことなる切り口で、テンプレ的・優等生的な表現は避け、視聴者の本音や感情を突く言葉にしてください。

        必ず次のJSONだけを返す(前後に説明文を付けない):
        {
          "main_copy": "サムネ主役コピー。原則【1行】(最大16文字程度)。よほど長い時のみ \n で改行。口語・本音・煽り可",
          "highlight_word": "main_copyとは別に独立表示する『煽りの一言』(最大12文字程度・別行で色付き表示)。main_copy/sub_copy と語句を重複させない。例: main『未経験から エンジニアへ』なら highlight『もう遅い…は嘘』",
          "sub_copy": "補足の一言。最大20文字。具体性 or 意外性を入れる。main_copy/highlight_word と重複させない",
          "panels": ["3コマサムネ 左(ビフォー/過去)=タイトルや要点に出てくる『前職・当時の状況/悩み』を表す一言", "中(転機)=プログラミング学習や挑戦・決断の一言", "右(アフター/現在)=エンジニア等になった到達点・成功の一言。3つでストーリーが繋がり最後は前向きに。各6〜14文字"]
        }
        panels は必ず【この動画のタイトル/要点に実際に書かれた経歴】に沿わせる。
        左=その人の過去・当時の状況や前職、中=学習や転機、右=現在(エンジニア等)。
        ★前職は例文の職業を流用せず、タイトル/要点に書かれた職業をそのまま使う(例: タイトルに「テスター」とあれば左はテスター、「介護士」とあれば介護士)。タイトル/要点に無い職業を勝手に当てはめない。
        ルール:
        - main_copy / highlight_word / sub_copy は【3つとも違う文言】にする。同じ語句を使い回さない(重複厳禁)
        - 実在の人が口にするような自然な言い回し(例:「未経験はもう無理?」「全落ちした話」「知らないと損」)
        - 数字・固有の事実・ギャップ(理想→現実)を活かす
        - 嘘や過度な誇張はしない。内容に裏打ちされた範囲で強く
        - 難しい漢字を避け、ひと目で読める言葉に
        - 毎回バリエーションを変える(同じ言い回しを繰り返さない)
      # 文言を「誤字脱字のみ」直すときの system プロンプト
      proofread_system: |
        あなたは日本語の校正者です。与えられたサムネ文言の【誤字脱字・変換ミス・表記ゆれ(全角半角・送り仮名・固有名詞)】だけを直します。言い回し・語順・意味・トーン・長さは絶対に変えません。新しい表現の提案・言い換え・煽りの追加・空欄の補完は一切しません。入力と同じJSONキー(main_copy/highlight_word/sub_copy/panels)で、値は校正後の文字列を返してください。前後に説明文は付けません。
    video_script:
      # 西野式 YouTube セールス台本テンプレート(挨拶→企画コール→本編→誘導)
      template: |
        ■挨拶
          ギャップのある経歴を一文でインパクトある自己紹介に。
          形は「〈本人の前職・当時の状況〉から〈現在の仕事〉になった〇〇です」。
          ★ここで使う職業・数字は必ず【ペルソナ/スキルシート/マインドマップ/動画タイトル】の本人の事実から取る。
          例文の職業や数字(介護士・月収◯万 等)をそのまま流用しない。例えばタイトルが「テスター→エンジニア(時給1300→3200)」なら、その実際の経歴・数字で自己紹介する。
        ■企画コール
          ・大きな問題定義（視聴者が抱える悩みを言語化）
          ・具体例（あるあるの具体シーン）
          ・最悪の未来（このままだとどうなるか）
          ・ベネフィット（この動画を見ると何が得られるか）
          ・ターゲット指定（「こんな人に向けて話します」）
          ・自己紹介（なぜ自分が語れるのか／実績）
          ・要点まとめ（今日話す3つの要点を予告）
        ■本編
          要点内容1：（テーマに沿った1つ目）→ 未来／問題／原因／解決 の順で語る
          要点内容2：なにから始めれば良いのか → 未来／問題／原因／解決
          要点内容3：（3つ目）→ 未来／問題／原因／解決
        ■最終まとめ
          今日の要点を1,2,3で振り返る
        ■LINE誘導
          公式LINEへの登録を自然に促す
        ■アウトプット誘導
          コメント・実践などのアウトプットを促す
