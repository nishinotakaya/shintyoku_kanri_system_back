          - 知的・信頼感・「仕事ができる人」感。ひと目で説得力・実績のある印象が伝わる
        nikushoku_danshi: |
          日本のYouTube教育・ビジネス系で映える「ギラギラ自信満々・情熱系の男」サムネイルの【背景画像】を生成してください。
          重要: 画像内に文字・テキスト・ロゴは一切描かない(あとで別途合成します)。

          # テーマ
          - タイトル: %{title}
          - 内容の要点: %{summary}

          # 画づくり(16:9 / 1536x1024)
          - 右側に、強い目力でカメラに指を突きつける or 拳を握る20〜30代の日本人男性。エネルギッシュで攻めた表情
          - 実写風 or セミリアル(2.5D厚塗り)。赤×黒×金を基調に、炎・稲妻・集中線のモチーフで勢いを表現
