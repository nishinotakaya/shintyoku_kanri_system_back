          - 表情は大げさに、漫画的な感情記号(汗・怒りマーク・輝き等。文字は使わない)を添えても良い
          - 明るく清潔感のあるアニメ/マンガ塗り(セルルック)、はっきりした輪郭線、高彩度
          - 画面上部 約15% と 下部 約20% は、タイトル帯を乗せるため暗めの余白として空けておく(キャラを置かない)

          # トーン
          - テンポの良い実況・リアクション感。ひと目で「喋りながら盛り上がっている・オチがある」ことが伝わる
        semi_real_talking: |
          日本のYouTube教育系で映える「セミリアル(アニメと実写の中間・2.5D厚塗りイラスト風)」サムネイルの【背景画像】を生成してください。
          重要: 画像内に文字・テキスト・ロゴは一切描かない(あとで別途合成します)。

          # テーマ
          - タイトル: %{title}
