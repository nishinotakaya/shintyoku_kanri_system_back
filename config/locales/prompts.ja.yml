# AI プロンプト集（コードから外出し）。文言調整はこのファイルだけで完結する。
# 参照: ThumbnailPrompts / ThumbnailCopywriter / InterviewVideoScriptGenerator
# %{title} / %{summary} は実行時に差し込まれる（フロントの編集欄では生のまま表示される）。
ja:
  prompts:
    thumbnail:
      # 背景生成スタイル（フロントのスタイル選択／プロンプト編集欄の初期値）
      styles:
        proaka: |
          「未経験・初心者がAI(Claude Code等)で本物のアプリを作れる」YouTube動画のサムネの【背景画像】を生成してください。
          重要: 画像内に文字・テキスト・ロゴ・UIの文字ラベルは一切描かない(あとで別途合成します)。

          # テーマ
          - タイトル: %{title}
          - 内容の要点: %{summary}
          - コンセプト: プログラミング未経験・初心者が AI(Claude Code 等)で「本物の動くアプリ」を作れるようになる、という驚きと希望。「自分にもできそう」と思わせる親近感が最重要。ブランド名やチャンネル名は画像に一切入れない。

          # 画づくり(16:9 / 1536x1024)
          - 右側〜中央に、20〜30代の親しみやすい日本人男性(清潔感)が、ノートPCの画面を見せながら驚き＆嬉しい表情(「え、自分にもできた！」)。明るいアニメ塗り or 実写風、どちらも高彩度・高コントラスト
          - ノートPCやモニタの画面には「本物の業務アプリ/ダッシュボードが動いている」雰囲気の抽象UI(グラフ・カード・表のシルエット。文字は書かない)。=「未経験でも本物を作れた」証拠感
          - 背景はモダンなAI/テック感: 紫〜青のグラデーション + 光の粒子やコードの抽象、右上に上昇を示す矢印/グラフのモチーフ(成功・収益の暗喩)
          - 左側 と 画面下 約25% は、大きなタイトル文字を乗せるため暗め・すっきりした余白として空ける(人物や要素を置かない)
          - アクセントに黄色の輝きを少々(あとで合成する黄色の強調文字と馴染むよう)

          # トーン
          - 前向き・爽快・「初心者でも手が届く」親近感。ひと目で「未経験 → AIで本物のアプリが作れた」が伝わる
        anime_journey: |
          日本のYouTube教育・エンジニア転職系で流行している「アニメ調・3コマ ビフォー→転機→アフター」サムネイルの【イラスト背景】を生成してください。
          重要: 画像内に文字・テキスト・吹き出し・ロゴは一切描かない(あとで別途合成します)。

          # テーマ
          - タイトル: %{title}
          - 内容の要点: %{summary}
          - 上のタイトル/要点から「前職(過去の職業)」と「現在(エンジニア等)」を読み取り、その実際の職業・経歴に沿って描くこと。

          # 構図(16:9 / 1536x1024)
          - 横に3コマ並べる(細い区切り線)。同じ若い日本人男性(主人公)が左→中→右で人生が好転する。3コマとも一貫した同一人物の男性。
            - 左(ビフォー/前職): 【タイトル/要点に実際に書かれた前職・当時の状況】の現場で働く様子。例の職業をそのまま使わず、その動画の実際の経歴に合わせる(例はあくまで例: 接客なら店頭、工場なら製造現場、テスターなら地味な検証作業)。表情は疲れ・悩み。
              ※その前職がPCを使わない職種なら、左コマにノートPCは置かない(不自然な絵にしない)
            - 中(転機/学習): 自宅やカフェでノートPCに向かいプログラミングを学習。集中、少し苦戦
            - 右(アフター/現在): エンジニアとして活躍(きれいなデスク＋ノートPCや複数モニタ)。自信のある明るい笑顔
          - 明るく清潔感のあるアニメ/マンガ塗り(セルルック)、はっきりした輪郭線、高彩度
          - 画面下 約20%は、タイトル帯を乗せるため暗めの余白として空けておく(キャラを置かない)

          # トーン
          - 前向きで爽快。ひと目で「前職 → 学習 → エンジニア成功」の成長ストーリーが伝わる
        graphic_only: |
