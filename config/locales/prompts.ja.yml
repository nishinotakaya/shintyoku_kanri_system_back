          # 画づくり(16:9 / 1536x1024)
          - 右側に、20〜30代の日本人男性がカメラ目線で今まさに喋っているバストアップ。口が開いていて、手振り・指差しなどのジェスチャーを添える
          - VLog/実況動画の1フレームのような臨場感。2.5D・厚塗りイラスト風(アニメと実写の中間)
