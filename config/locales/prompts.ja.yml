        dekiru_danshi: |
          日本のYouTube教育・ビジネス系で映える「仕事ができる爽やかな男」サムネイルの【背景画像】を生成してください。
          重要: 画像内に文字・テキスト・ロゴは一切描かない(あとで別途合成します)。

          # テーマ
          - タイトル: %{title}
          - 内容の要点: %{summary}

          # 画づくり(16:9 / 1536x1024)
          - 右側に、20〜30代の清潔感ある日本人男性(スマートカジュアル or ジャケット)。自信のある落ち着いた笑みで、腕組み or ノートPCを片手に持つポーズ
          - 実写風 or セミリアル(2.5D厚塗り)。知的でクリーンな配色(白×ネイビー×ゴールド系)
          - 背景はオフィス/都会の夜景・ビル群をぼかした奥行き
          - 左側は文字を乗せる余白としてすっきり

