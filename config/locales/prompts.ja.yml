      # 文言(コピー)を新規生成するときの system プロンプト
      copywriter_system: |
        あなたは日本のトップYouTuberのサムネを量産するプロのコピーライターです。
        動画タイトルと内容要点から、思わずクリックしたくなる「リアルで生々しい」サムネ文言を作ります。
        毎回ことなる切り口で、テンプレ的・優等生的な表現は避け、視聴者の本音や感情を突く言葉にしてください。

        必ず次のJSONだけを返す(前後に説明文を付けない):
        {
          "main_copy": "サムネ主役コピー。原則【1行】(最大16文字程度)。よほど長い時のみ \n で改行。口語・本音・煽り可",
          "highlight_word": "main_copyとは別に独立表示する『煽りの一言』(最大12文字程度・別行で色付き表示)。main_copy/sub_copy と語句を重複させない。例: main『未経験から エンジニアへ』なら highlight『もう遅い…は嘘』",
          "sub_copy": "補足の一言。最大20文字。具体性 or 意外性を入れる。main_copy/highlight_word と重複させない",
          "panels": ["3コマサムネ 左(ビフォー/過去)=タイトルや要点に出てくる『前職・当時の状況/悩み』を表す一言", "中(転機)=プログラミング学習や挑戦・決断の一言", "右(アフター/現在)=エンジニア等になった到達点・成功の一言。3つでストーリーが繋がり最後は前向きに。各6〜14文字"]
        }
        panels は必ず【この動画のタイトル/要点に実際に書かれた経歴】に沿わせる。
        左=その人の過去・当時の状況や前職、中=学習や転機、右=現在(エンジニア等)。
        ★前職は例文の職業を流用せず、タイトル/要点に書かれた職業をそのまま使う(例: タイトルに「テスター」とあれば左はテスター、「介護士」とあれば介護士)。タイトル/要点に無い職業を勝手に当てはめない。
        ルール:
        - main_copy / highlight_word / sub_copy は【3つとも違う文言】にする。同じ語句を使い回さない(重複厳禁)
        - 実在の人が口にするような自然な言い回し(例:「未経験はもう無理?」「全落ちした話」「知らないと損」)
        - 数字・固有の事実・ギャップ(理想→現実)を活かす
        - 嘘や過度な誇張はしない。内容に裏打ちされた範囲で強く
        - 難しい漢字を避け、ひと目で読める言葉に
        - 毎回バリエーションを変える(同じ言い回しを繰り返さない)
      # 文言を「誤字脱字のみ」直すときの system プロンプト
      proofread_system: |
        あなたは日本語の校正者です。与えられたサムネ文言の【誤字脱字・変換ミス・表記ゆれ(全角半角・送り仮名・固有名詞)】だけを直します。言い回し・語順・意味・トーン・長さは絶対に変えません。新しい表現の提案・言い換え・煽りの追加・空欄の補完は一切しません。入力と同じJSONキー(main_copy/highlight_word/sub_copy/panels)で、値は校正後の文字列を返してください。前後に説明文は付けません。
    video_script:
      # 西野式 YouTube セールス台本テンプレート(挨拶→企画コール→本編→誘導)
      template: |
        ■挨拶
          ギャップのある経歴を一文でインパクトある自己紹介に。
          形は「〈本人の前職・当時の状況〉から〈現在の仕事〉になった〇〇です」。
          ★ここで使う職業・数字は必ず【ペルソナ/スキルシート/マインドマップ/動画タイトル】の本人の事実から取る。
          例文の職業や数字(介護士・月収◯万 等)をそのまま流用しない。例えばタイトルが「テスター→エンジニア(時給1300→3200)」なら、その実際の経歴・数字で自己紹介する。
        ■企画コール
          ・大きな問題定義（視聴者が抱える悩みを言語化）
          ・具体例（あるあるの具体シーン）
          ・最悪の未来（このままだとどうなるか）
          ・ベネフィット（この動画を見ると何が得られるか）
          ・ターゲット指定（「こんな人に向けて話します」）
          ・自己紹介（なぜ自分が語れるのか／実績）
          ・要点まとめ（今日話す3つの要点を予告）
        ■本編
          要点内容1：（テーマに沿った1つ目）→ 未来／問題／原因／解決 の順で語る
          要点内容2：なにから始めれば良いのか → 未来／問題／原因／解決
          要点内容3：（3つ目）→ 未来／問題／原因／解決
        ■最終まとめ
          今日の要点を1,2,3で振り返る
        ■LINE誘導
          公式LINEへの登録を自然に促す
        ■アウトプット誘導
          コメント・実践などのアウトプットを促す
    kanpe:
      # 西野式 YouTube セールス カンペ(cue sheet)テンプレート。撮影中にチラ見して話す前提でラベルを見せる。
      template: |
        【挨拶】
          ギャップのある経歴を一文でインパクトある自己紹介に（「〈前職・当時の状況〉から〈現在〉になった〈フルネーム〉です」）。続けて「今日は「◯◯」について話していきます」。
          ★必ず本人のフルネームを名乗る。職業・数字は必ずペルソナ/スキルシートの本人の事実から取る。例文の数字を流用しない。
        【企画コール】
          「今回の企画は「◯◯」について話していきます」と企画名を宣言する1〜2文。
        【大きな問題定義】
          視聴者が抱える悩みを「〜だと思います」で言語化。「あなたは〜と感じている方がほとんどだと思います」の形で、悩みの声を3つ程度「」で並べる。
        【具体例】
          「実際に僕のところに相談に来る人で、こんな人がいました」等、あるあるの具体シーン・セリフを1つ。
        【最悪の未来】
          このまま行動しないとどうなるかを1〜2文で突きつける。
        【ベネフィット】
          「でも逆に、今日話す内容を理解して正しいアプローチを取れば〜できるようになります」の形。
        【ターゲット指定】
          「この動画は、〜な人に向けて話します」と対象を明示。
        【自己紹介】
          「改めて自己紹介すると、〈フルネーム〉と申します〜」。なぜ自分が語れるのか、実績・経歴（ペルソナの事実のみ）。ここでも必ず名前を名乗る。
        【要点まとめ】
          「今日お話しする内容は3つのポイントです」＋要点3つを予告（予告した個数と本編を必ず一致させる）。
        【本編 要点内容1】【本編 要点内容2】【本編 要点内容3】
          （見出しは【本編 要点内容1】のように1つずつ分けて出す）
          各要点は必ず「未来：」「問題：」「原因：」「解決：」のラベル付きで書く（カンペなのでラベルを見せる）。
          未来=これができるとどうなるか / 問題=視聴者がつまずく現実 / 原因=なぜそうなるか / 解決=どうすればいいか。
          各ラベルの段落は2〜4文で、具体例・あるあるのシーン・体験談を交えて厚めに語る（1文だけの薄い段落にしない）。
          要点の橋渡し（「まぁでも〜ですよね。そこで要点内容2は」等）も入れてテンポを作る。
        【最終まとめ】
          「今日の内容をまとめます」＋要点1,2,3の振り返り＋全体を貫く一言。
        【LINE誘導】
          公式LINEへの登録を自然に促す（無料プレゼント・概要欄リンク訴求）。
        【アウトプット誘導】
          高評価・チャンネル登録・コメントを促して締める。
      # アプリを作る完全台本テンプレート(Claude Code等でアプリを作って見せる動画用)。
      # フック→オープニング→ツール説明→実演デモ→AI時代の価値→副業→CTA の構成。
      app_build_template: |
        【フック】
          完成したアプリの画面を見せながら「これ、何で作ったと思いますか？」から始める。「コードを1行ずつ書いたわけではなく、AIに話しかけてお願いしただけ」という種明かし→「完璧ではない」という正直な前置き→「今日はゼロの状態から◯◯を作る流れをお見せします」で本編へ。【画面】【テロップ】の演出指示行を入れる。
        【オープニング】
          本人のギャップのある経歴で自己紹介（必ずフルネーム。数字・経歴はペルソナ/スキルシートの事実のみ）。「この動画で話す3つのこと」を箇条書きテロップで予告。
        【ツール説明】
          使うAIツールを一言で説明。ChatGPT等との違いを「教えてくれる」vs「一緒に作業してくれる開発パートナー」の対比で。専門用語を使わない。
        【デモ準備】
          何もない状態（空のフォルダ・ターミナルだけ）を見せる。「本当にゼロからスタート」の画作り。
        【デモ お願いする】
          AIに伝えるプロンプトをそのまま読む。「要件定義書とか難しいものは何も用意していない。友達にお願いするような言葉で伝えただけ」と補足。プロンプト全文を「」で書く。
        【デモ AIが作る様子】
          AIがファイルを作りコードを書く様子を実況。「この間、僕は何もしていません」。エラーが出てもAIが自分で読んで自分で直すこと＝挫折ポイントNo.1のエラー解決をAIが巻き取ることを強調。
        【デモ 完成・動作確認】
          ブラウザで開いて実際に操作する。具体的な入力例（金額や項目など）を2〜4件。追加の修正指示を1つ出して反映される様子→「会話しながら育てていく感覚」。最後に「これで完璧ではない。人間が確認すべき部分は残る」と正直に締める。
        【AI時代の価値】
          「エンジニアはもう要らない？」への正直な回答。変わる部分（書くだけの仕事は減る）と価値が上がる部分（気づいて直せる人・要望を整理して伝えられる人）。「目指すのは100点ではなく判断できる30点」の論理。
        【副業への繋げ方】
          大企業ではなく親戚・友人・地元の店の身近な困りごとの実例を2〜3個。相場感（1件◯万〜◯万円×月◯件）と「納品できる品質のために30点の基礎が効く」ことをセットで。
        【今日からの3ステップ+CTA】
          ステップ1=まず触ってみる（プロンプトは概要欄に）／ステップ2=30点の基礎を作る／ステップ3=身近な1件を作ってみる。最後に体験会・公式LINEへ自然に誘導し、「それでは、また次の動画で。◯◯でした」で締める。
        【デモ用プロンプト】
          概要欄掲載用に、デモでAIに伝えるプロンプト全文と追加修正用プロンプトをそのまま書く。
